name: code-debug-env
version: 1.0.0
description: >
  An OpenEnv environment where an AI agent debugs Python code.
  The agent receives buggy code and error messages, submits fixes,
  and is scored based on whether the fixed code runs correctly
  and passes unit tests. Simulates real-world software debugging.

tags:
  - openenv
  - code-debugging
  - reinforcement-learning
  - python
  - real-world

observation_space:
  type: object
  fields:
    challenge_id:
      type: string
      description: Unique identifier for the challenge
    difficulty:
      type: string
      enum: [easy, medium, hard]
    description:
      type: string
      description: What the agent needs to fix
    buggy_code:
      type: string
      description: The broken Python code
    error_message:
      type: string
      description: Error thrown or wrong output description
    hint:
      type: string
      description: Optional hint to guide the agent
    step:
      type: integer
      description: Current timestep in the episode
    max_steps:
      type: integer
      description: Maximum steps allowed per episode

action_space:
  type: object
  fields:
    fixed_code:
      type: string
      description: Agent's corrected version of the buggy code

reward:
  type: float
  range: [0.0, 1.0]
  description: >
    Score based on correctness of the fix.
    Easy: 1.0 if output matches, 0.3 if runs but wrong output, 0.0 if crashes.
    Medium: 1.0 if correct, 0.4 if runs but wrong, 0.1 if still errors.
    Hard: fraction of unit tests passed (0/3=0.0, 1/3=0.33, 2/3=0.67, 3/3=1.0).

tasks:
  - name: easy
    challenge_id: easy_001
    difficulty: easy
    max_steps: 3
    description: Fix a single syntax error — missing colon in function definition
    success_threshold: 1.0

  - name: medium
    challenge_id: medium_001
    difficulty: medium
    max_steps: 5
    description: Fix a logic bug — find_max fails on all-negative lists
    success_threshold: 1.0

  - name: hard
    challenge_id: hard_001
    difficulty: hard
    max_steps: 7
    description: Fix multiple bugs in BankAccount class — all 3 unit tests must pass
    success_threshold: 1.0

api:
  reset:
    description: Resets environment and loads a fresh challenge
    returns: Observation
  step:
    description: Submit fixed code, get reward and next observation
    input: Action
    returns: StepResult (observation, reward, done, info)
  state:
    description: Returns full current environment state
    returns: dict

runtime:
  language: python
  python_version: "3.10"
  max_episode_steps: 7
  inference_timeout_minutes: 20
  min_vcpu: 2
  min_memory_gb: 8

authors:
  - name: Hackathon Participant
    github: ""

license: MIT